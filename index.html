<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoAdvisor | Professional Crypto Consulting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
    </style>
</head>
<body class="bg-[#0a0f1c] text-slate-200 font-sans">
    <div id="nav-cta-container"></div>
    <header class="hero-bg pt-20 pb-24 text-center">
        <h1 class="text-6xl font-bold text-white">CRYPTO ADVISOR</h1>
    </header>
    <section id="lien-he" class="py-24">
        <div class="max-w-md mx-auto">
            <form id="contactForm" class="space-y-6">
                <input type="text" name="name" placeholder="Họ và tên" required class="w-full bg-slate-900 p-4 border border-slate-700 rounded-lg">
                <input type="email" name="email" placeholder="Email" required class="w-full bg-slate-900 p-4 border border-slate-700 rounded-lg">
                <input type="tel" name="phone" placeholder="Số điện thoại" required class="w-full bg-slate-900 p-4 border border-slate-700 rounded-lg">
                <button type="submit" class="w-full bg-amber-500 py-4 rounded-lg font-bold">GỬI ĐĂNG KÝ</button>
            </form>
        </div>
    </section>
    <script src="connect-backend.js"></script>
</body>
</html>
